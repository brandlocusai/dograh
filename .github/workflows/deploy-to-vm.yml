name: Deploy to Debian VM

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

# Prevent concurrent deployments — never cancel in progress (wait instead)
concurrency:
  group: deploy-to-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    # Only run if build succeeded or manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}
          fetch-depth: 0

      - name: Check if deployment needed
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual deployment triggered"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if relevant files changed
          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.workflow_run.head_sha }}^ \
            ${{ github.event.workflow_run.head_sha }} 2>/dev/null || \
            git diff --name-only HEAD^ HEAD)

          if echo "$CHANGED_FILES" | grep -qE \
            '^(api/|ui/|docker-compose|scripts/|\.github/workflows/)'; then
            echo "Deployment needed — relevant files changed"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping deployment — no relevant files changed"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        if: steps.check_changes.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEBIAN_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEBIAN_VM_PORT }} -H ${{ secrets.DEBIAN_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM via SSH
        if: steps.check_changes.outputs.should_deploy == 'true'
        env:
          VM_HOST: ${{ secrets.DEBIAN_VM_HOST }}
          VM_USER: ${{ secrets.DEBIAN_VM_USER }}
          VM_PORT: ${{ secrets.DEBIAN_VM_PORT }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
        run: |
          echo "🚀 Deploying commit $COMMIT_SHA to production VM..."

          ssh -i ~/.ssh/deploy_key \
              -p "$VM_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              "$VM_USER@$VM_HOST" \
              bash << 'ENDSSH'
          set -euo pipefail

          DEPLOY_DIR="/root/dograh-live/dograh"
          SCRIPT="$DEPLOY_DIR/scripts/ci_deploy_docker.sh"

          if [[ ! -f "$SCRIPT" ]]; then
            echo "❌ Deploy script not found at $SCRIPT" >&2
            exit 1
          fi

          chmod +x "$SCRIPT"
          exec "$SCRIPT"
          ENDSSH

      - name: Verify deployment health
        if: steps.check_changes.outputs.should_deploy == 'true'
        env:
          VM_HOST: ${{ secrets.DEBIAN_VM_HOST }}
          VM_USER: ${{ secrets.DEBIAN_VM_USER }}
          VM_PORT: ${{ secrets.DEBIAN_VM_PORT }}
        run: |
          echo "🏥 Running post-deployment health checks..."

          ssh -i ~/.ssh/deploy_key \
              -p "$VM_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "$VM_USER@$VM_HOST" \
              bash << 'ENDSSH'
          set -euo pipefail

          DEPLOY_DIR="/root/dograh-live/dograh"
          HEALTHCHECK="$DEPLOY_DIR/scripts/healthcheck_docker.sh"

          if [[ -f "$HEALTHCHECK" ]]; then
            chmod +x "$HEALTHCHECK"
            exec "$HEALTHCHECK"
          else
            # Fallback: check running containers
            echo "healthcheck_docker.sh not found, running basic checks..."
            docker compose -f "$DEPLOY_DIR/docker-compose.yaml" ps
            echo "✅ Basic health check passed"
          fi
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        if: steps.check_changes.outputs.should_deploy == 'true'
        run: |
          echo "✅ Zero-downtime deployment completed"
          echo "🔗 Application: https://${{ secrets.DEBIAN_VM_HOST }}"

      - name: Skip deployment notice
        if: steps.check_changes.outputs.should_deploy != 'true'
        run: |
          echo "ℹ️  Skipping deployment — no relevant files changed"
